[pytest]
verbosity_assertions = 2
verbosity_test_cases = 2
cache_dir = /tmp/pytest_cache
# pytest-notebook (transitive dep in the image) registers an nb_regression
# plugin whose pytest_collect_file(path, parent) hook was removed in pytest 8.
# Our tests use nbclient directly and don't need it, so block the plugin to
# stop pytest from failing at collection time.
addopts = -p no:nb_regression
